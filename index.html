<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krom SS Tools</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f12;
    --bg2: #13161b;
    --bg3: #1a1e25;
    --border: #ffffff0f;
    --border2: #ffffff18;
    --accent: #4f8ef7;
    --accent2: #2563d4;
    --red: #f74f4f;
    --amber: #f7a94f;
    --green: #4ff78e;
    --text: #e8eaf0;
    --muted: #6b7280;
    --mono: 'Share Tech Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 9999;
  }
  .titlebar {
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px; height: 48px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .titlebar-logo {
    width: 26px; height: 26px; background: var(--accent);
    border-radius: 6px; display: flex; align-items: center; justify-content: center;
    font-family: var(--mono); font-size: 13px; font-weight: bold; color: #fff;
  }
  .titlebar-name { font-family: var(--mono); font-size: 13px; color: var(--text); letter-spacing: 0.05em; }
  .titlebar-name span { color: var(--accent); }
  .titlebar-ver {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 2px 6px;
  }
  .titlebar-time { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  .titlebar-status {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-family: var(--mono);
  }
  .titlebar-status.done { color: var(--green); }
  .titlebar-status.done::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
  }
  .titlebar-status.waiting { color: var(--muted); }
  .titlebar-status.waiting::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .layout { display: flex; flex: 1; overflow: hidden; }

  .sidebar {
    width: 200px; flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    padding: 12px 8px; gap: 2px;
    overflow-y: auto;
  }
  .sidebar-section {
    font-family: var(--mono); font-size: 9px; color: var(--muted);
    letter-spacing: 0.12em; text-transform: uppercase; padding: 8px 10px 4px;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 6px;
    font-size: 13px; font-family: var(--sans); color: var(--muted);
    cursor: pointer; border: none; background: none; width: 100%; text-align: left;
    transition: all 0.12s; position: relative;
  }
  .nav-btn:hover { background: var(--bg3); color: var(--text); }
  .nav-btn.active {
    background: var(--bg3); color: var(--text); font-weight: 500;
    border: 1px solid var(--border2);
  }
  .nav-btn.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 2px; height: 60%; border-radius: 0 2px 2px 0; background: var(--accent);
  }
  .nav-btn .flag-dot {
    margin-left: auto; width: 7px; height: 7px; border-radius: 50%;
    background: var(--red); box-shadow: 0 0 5px var(--red); flex-shrink: 0;
  }
  .nav-btn .ok-dot {
    margin-left: auto; width: 7px; height: 7px; border-radius: 50%;
    background: var(--green); flex-shrink: 0;
  }
  .nav-icon { font-size: 13px; width: 16px; text-align: center; opacity: 0.8; }
  .divider { height: 1px; background: var(--border); margin: 6px 0; }

  .panel { flex: 1; overflow-y: auto; padding: 24px 28px; background: var(--bg); }
  .panel-header { margin-bottom: 20px; }
  .panel-title { font-family: var(--mono); font-size: 16px; color: var(--text); letter-spacing: 0.04em; margin-bottom: 4px; }
  .panel-title span { color: var(--accent); }
  .panel-sub { font-size: 13px; color: var(--muted); }

  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .summary-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 8px; padding: 14px 16px;
  }
  .summary-card.has-flags { border-color: #f74f4f40; background: #f74f4f08; }
  .summary-card.all-ok { border-color: #4ff78e30; background: #4ff78e08; }
  .summary-card-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-family: var(--mono); }
  .summary-card-count { font-size: 22px; font-weight: 500; font-family: var(--mono); }
  .summary-card.has-flags .summary-card-count { color: var(--red); }
  .summary-card.all-ok .summary-card-count { color: var(--green); }
  .summary-card-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }

  .result-section { margin-bottom: 20px; }
  .result-section-title {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .result-section-badge {
    font-size: 9px; padding: 2px 6px; border-radius: 4px; font-family: var(--mono);
  }
  .badge-red { background: #f74f4f20; color: var(--red); border: 1px solid #f74f4f30; }
  .badge-green { background: #4ff78e20; color: var(--green); border: 1px solid #4ff78e30; }
  .badge-amber { background: #f7a94f20; color: var(--amber); border: 1px solid #f7a94f30; }

  .result-line {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 7px 12px; border-radius: 5px;
    font-family: var(--mono); font-size: 12px;
    margin-bottom: 3px; line-height: 1.5;
  }
  .result-line.flagged { background: #f74f4f12; color: #f7a0a0; border: 1px solid #f74f4f20; }
  .result-line.normal { background: var(--bg2); color: #a8b5cc; border: 1px solid var(--border); }
  .result-line.warn { background: #f7a94f10; color: #e0b87a; border: 1px solid #f7a94f20; }
  .result-line.good { background: #4ff78e0d; color: #7adfaa; border: 1px solid #4ff78e20; }
  .result-dot { margin-top: 4px; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: var(--red); box-shadow: 0 0 5px var(--red); }
  .dot-amber { background: var(--amber); }
  .dot-green { background: var(--green); }
  .dot-gray { background: var(--muted); }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-family: var(--mono); font-size: 12px; line-height: 2;
  }
  .empty-state .cmd {
    display: inline-block; margin-top: 12px;
    background: var(--bg2); border: 1px solid var(--border2);
    border-radius: 6px; padding: 8px 16px;
    color: var(--accent); font-size: 13px;
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<div class="titlebar">
  <div class="titlebar-logo">K</div>
  <span class="titlebar-name"><span>krom</span> SS tools</span>
  <span class="titlebar-ver">v1.0</span>
  <span class="titlebar-time" id="scan-time"></span>
  <span class="titlebar-status waiting" id="status-dot">waiting</span>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-section">Results</div>
    <button class="nav-btn active" id="nav-overview" onclick="showSection('overview', this)">
      <span class="nav-icon">📊</span> Overview
    </button>
    <div id="nav-buttons"></div>
    <div class="divider"></div>
    <div class="sidebar-section">Info</div>
    <button class="nav-btn" onclick="showSection('about', this)">
      <span class="nav-icon">ℹ️</span> About
    </button>
  </div>

  <div class="panel" id="panel-content"></div>
</div>

<script>
const RAW_DATA = '%%SCAN_RESULTS%%';
const SCAN_TIME = '%%SCAN_TIME%%';

let scanData = null;

function init() {
  // Try to parse injected data
  try {
    if (RAW_DATA && !RAW_DATA.startsWith('%%')) {
      scanData = JSON.parse(RAW_DATA);
    }
  } catch(e) { scanData = null; }

  if (SCAN_TIME && !SCAN_TIME.startsWith('%%')) {
    document.getElementById('scan-time').textContent = 'scanned ' + SCAN_TIME;
  }

  if (scanData) {
    document.getElementById('status-dot').textContent = 'scan complete';
    document.getElementById('status-dot').className = 'titlebar-status done';
    buildNavButtons();
    showSection('overview', document.getElementById('nav-overview'));
  } else {
    showNoData();
  }
}

function buildNavButtons() {
  const container = document.getElementById('nav-buttons');
  const icons = {
    'MOD SCANNER': '🧩',
    'RENAMED JARS': '✏️',
    'RECYCLE BIN': '♻️',
    'DELETED FILES': '🗑',
    'RECENTLY MODIFIED': '📁'
  };
  container.innerHTML = '';
  for (const section of Object.keys(scanData)) {
    const lines = scanData[section];
    const hasFlags = lines.some(l => l.startsWith('[FLAGGED') || l.startsWith('[MISMATCH'));
    const hasWarn = lines.some(l => l.startsWith('[WARN'));
    const id = 'section-' + section.replace(/\s/g, '-');
    const dot = hasFlags
      ? '<span class="flag-dot"></span>'
      : hasWarn ? '' : '<span class="ok-dot"></span>';
    const icon = icons[section] || '📄';
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.id = 'nav-' + id;
    btn.innerHTML = `<span class="nav-icon">${icon}</span> ${section.toLowerCase()} ${dot}`;
    btn.onclick = function() { showSection(id, this); };
    container.appendChild(btn);
  }
}

function showSection(id, btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const content = document.getElementById('panel-content');

  if (id === 'overview') { renderOverview(content); return; }
  if (id === 'about') { renderAbout(content); return; }

  const sectionKey = id.replace('section-', '').replace(/-/g, ' ');
  renderSection(content, sectionKey);
}

function renderOverview(content) {
  if (!scanData) { showNoData(); return; }

  let totalFlags = 0, totalWarns = 0, totalOk = 0;
  for (const lines of Object.values(scanData)) {
    lines.forEach(l => {
      if (l.startsWith('[FLAGGED') || l.startsWith('[MISMATCH')) totalFlags++;
      else if (l.startsWith('[WARN')) totalWarns++;
      else totalOk++;
    });
  }

  const flagClass = totalFlags > 0 ? 'has-flags' : 'all-ok';

  let html = `
    <div class="panel-header">
      <div class="panel-title"><span>//</span> overview</div>
      <div class="panel-sub">Summary of all scan results</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card ${flagClass}">
        <div class="summary-card-label">flagged</div>
        <div class="summary-card-count">${totalFlags}</div>
        <div class="summary-card-sub">items need review</div>
      </div>
      <div class="summary-card ${totalWarns > 0 ? '' : 'all-ok'}">
        <div class="summary-card-label">warnings</div>
        <div class="summary-card-count" style="color:var(--amber)">${totalWarns}</div>
        <div class="summary-card-sub">minor issues</div>
      </div>
      <div class="summary-card all-ok">
        <div class="summary-card-label">clean</div>
        <div class="summary-card-count">${totalOk}</div>
        <div class="summary-card-sub">items look fine</div>
      </div>
    </div>`;

  for (const [section, lines] of Object.entries(scanData)) {
    const flags = lines.filter(l => l.startsWith('[FLAGGED') || l.startsWith('[MISMATCH'));
    const warns = lines.filter(l => l.startsWith('[WARN'));
    let badge = '';
    if (flags.length) badge = `<span class="result-section-badge badge-red">${flags.length} flagged</span>`;
    else if (warns.length) badge = `<span class="result-section-badge badge-amber">${warns.length} warn</span>`;
    else badge = `<span class="result-section-badge badge-green">clean</span>`;

    html += `<div class="result-section">
      <div class="result-section-title">${section} ${badge}</div>`;
    lines.forEach(line => { html += renderLine(line); });
    html += `</div>`;
  }

  content.innerHTML = html;
}

function renderSection(content, sectionKey) {
  const lines = scanData[sectionKey];
  if (!lines) return;

  const flags = lines.filter(l => l.startsWith('[FLAGGED') || l.startsWith('[MISMATCH'));
  const warns = lines.filter(l => l.startsWith('[WARN'));
  let badge = '';
  if (flags.length) badge = `<span class="result-section-badge badge-red">${flags.length} flagged</span>`;
  else if (warns.length) badge = `<span class="result-section-badge badge-amber">${warns.length} warnings</span>`;
  else badge = `<span class="result-section-badge badge-green">all clear</span>`;

  let html = `
    <div class="panel-header">
      <div class="panel-title"><span>//</span> ${sectionKey.toLowerCase()}</div>
      <div class="panel-sub">${lines.length} item${lines.length !== 1 ? 's' : ''} found ${badge}</div>
    </div>
    <div class="result-section">`;
  lines.forEach(line => { html += renderLine(line); });
  html += `</div>`;
  content.innerHTML = html;
}

function renderLine(line) {
  const isFlagged = /^\[FLAGGED|^\[MISMATCH/.test(line);
  const isWarn = /^\[WARN/.test(line);
  const isGood = /^\[OK/.test(line);
  const cls = isFlagged ? 'flagged' : isWarn ? 'warn' : isGood ? 'good' : 'normal';
  const dot = isFlagged ? 'dot-red' : isWarn ? 'dot-amber' : isGood ? 'dot-green' : 'dot-gray';
  return `<div class="result-line ${cls}">
    <div class="result-dot ${dot}"></div>
    <span>${escHtml(line)}</span>
  </div>`;
}

function renderAbout(content) {
  content.innerHTML = `
    <div class="panel-header">
      <div class="panel-title"><span>//</span> about</div>
      <div class="panel-sub">Krom SS Tools v1.0</div>
    </div>
    <div class="result-section">
      <div class="result-section-title">checks performed</div>
      <div class="result-line normal"><div class="result-dot dot-gray"></div><span>MOD SCANNER — checks filenames against known cheat client list</span></div>
      <div class="result-line normal"><div class="result-dot dot-gray"></div><span>RENAMED JARS — compares filename to internal mod ID in jar manifest</span></div>
      <div class="result-line normal"><div class="result-dot dot-gray"></div><span>RECYCLE BIN — lists items currently in Windows Recycle Bin</span></div>
      <div class="result-line normal"><div class="result-dot dot-gray"></div><span>DELETED FILES — searches Security event log for deleted .jar files (admin only)</span></div>
      <div class="result-line normal"><div class="result-dot dot-gray"></div><span>RECENTLY MODIFIED — finds .jar files changed in the last 7 days</span></div>
    </div>
    <div class="result-section">
      <div class="result-section-title">run command</div>
      <div class="result-line normal"><div class="result-dot dot-gray"></div><span>irm https://raw.githubusercontent.com/kromilio/krom-ss-tools/main/mc-check.ps1 | iex</span></div>
    </div>`;
}

function showNoData() {
  document.getElementById('panel-content').innerHTML = `
    <div class="empty-state">
      // no scan data found<br>
      run the powershell script to generate a report
      <div class="cmd">irm https://raw.githubusercontent.com/kromilio/krom-ss-tools/main/mc-check.ps1 | iex</div>
    </div>`;
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

init();
</script>
</body>
</html>
